name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # -----------------------
      # Checkout Repository
      # -----------------------
      - name: Checkout code
        uses: actions/checkout@v3

      # -----------------------
      # Python Setup & Validation
      # -----------------------
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flask redis flake8

      - name: Validate Python syntax
        run: |
          python -m py_compile Lab2/app.py || true
          python -m py_compile Lab3/app.py || true

      - name: Run Python linting
        run: |
          flake8 Lab2 Lab3 || true

      # -----------------------
      # Node.js Setup & Build
      # -----------------------
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build frontend
        working-directory: frontend
        run: npm run build || true

      # -----------------------
      # Docker Build Validation
      # -----------------------
      - name: Build Docker image
        run: |
          docker build -f Lab3/Dockerfile.basic -t mobile-cloud-system .
