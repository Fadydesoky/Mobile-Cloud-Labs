name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  backend:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.9", "3.10"]

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - run: |
          pip install flask redis flake8

      - run: |
          python -m py_compile Lab2/app.py
          python -m py_compile Lab3/app.py

      - run: |
          flake8 Lab2 Lab3 || true

  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: "18"

      - run: |
          cd frontend
          npm install
          npm run build || true

  docker:
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v3

      - run: |
          docker build -f Lab3/Dockerfile.basic -t mobile-cloud-system .
