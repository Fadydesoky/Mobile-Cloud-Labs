apiVersion: apps/v1
kind: Deployment
metadata:
  name: distributed-system-api
  namespace: distributed-systems
  labels:
    app: distributed-system-api
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: distributed-system-api
  template:
    metadata:
      labels:
        app: distributed-system-api
    spec:
      containers:
      - name: api
        image: mobile-cloud-system-lab2:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 5001
          protocol: TCP
        
        env:
        - name: REDIS_PRIMARY_HOST
          value: "redis-primary-service"
        - name: REDIS_PRIMARY_PORT
          value: "6379"
        - name: REDIS_REPLICA_HOST
          value: "redis-replica-service"
        - name: REDIS_REPLICA_PORT
          value: "6380"
        - name: APP_ENV
          value: "production"
        - name: CORS_ORIGIN
          value: "*"
        
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        
        readinessProbe:
          httpGet:
            path: /ready
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
        
        lifecycle:
          preStop:
            exec:
              command: ["/bin/sh", "-c", "sleep 5"]
      
      terminationGracePeriodSeconds: 30
